name: erptransportexpress
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.5.0
  shared_preferences: ^2.5.3
  file_picker: ^10.3.3
  uuid: ^4.5.1
  flutter_local_notifications: ^19.0.0    # keep your chosen version
  flutter_local_notifications_linux: ^6.0.0
  flutter_native_timezone: ^2.0.0
  url_launcher: ^6.1.10


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Merriweather
      fonts:
        - asset: assets/fonts/Merriweather-Italic-VariableFont_opsz,wdth,wght.ttf
          style: italic
